<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Tournament Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{font-family:system-ui,Segoe UI,Helvetica,Arial;max-width:760px;margin:40px auto;padding:0 20px;}
    label{display:block;margin-top:12px}
    input,select{width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid #ddd;box-sizing:border-box}
    button{margin-top:12px;padding:10px 16px;border-radius:8px;border:none;background:#0069d9;color:white;font-weight:600;cursor:pointer}
    .note{font-size:0.9rem;color:#555;margin-top:6px}
  </style>
</head>
<body>
  <h1>Tennis Tournament Analyzer — Web</h1>
  <form action="/analyze" method="post">
    <label>Tournament link (USTA playtennis URL)</label>
    <input type="url" name="tournament_link" placeholder="https://playtennis.usta.com/..." required>

    <label>Age group (exact text shown on the site)</label>
    <input type="text" name="age_group" placeholder="e.g., Boys 16's" required>

    <label>Draw size (e.g., 32)</label>
    <input type="number" name="draw_size" value="32" required>

    <label>Sort type</label>
    <select name="sort">
      <option value="1">Points (1)</option>
      <option value="2">WTN (2)</option>
    </select>

    <button type="submit">Generate PDF</button>
  </form>

  <p class="note">Notes: This site runs Playwright to scrape USTA pages. Avoid sending many requests at once. For best results run this on a server with enough memory (1-2GB) and allow a few seconds per player to scrape.</p>
</body>
</html>
